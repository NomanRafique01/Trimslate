<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trimslate</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <polyline points="10 9 9 9 8 9"/>
  </svg>
  <span>trimslate</span>
</div>

<div id="drop-zone" class="dropzone">
  <!-- Accepts all formats trimslate can convert -->
  <input type="file" id="file-input"
    accept=".pdf,.docx,.xlsx,.pptx,.html,.htm"
    hidden>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 16 12 12 8 16"/>
    <line x1="12" y1="12" x2="12" y2="21"/>
    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
  </svg>
  <p class="drop-label">Drop a file or <span class="link">choose file</span></p>
  <p class="drop-hint">PDF · DOCX · XLSX · PPTX · HTML</p>
</div>

<div id="converting-row" class="status-row hidden">
  <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
  </svg>
  <span id="converting-name" class="status-text">file.pdf</span>
  <span class="status-sub">converting...</span>
</div>

<div id="done-row" class="status-row hidden">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  <span id="done-name" class="status-text"></span>
</div>

<!-- Page range — only shown for PDFs -->
<div id="page-range" class="range-row hidden">
  <span class="range-label">Pages</span>
  <input type="number" id="page-from" min="1" value="1">
  <span class="range-sep">to</span>
  <input type="number" id="page-to" min="1" placeholder="end">
</div>

<div id="stats-row" class="stats hidden">
  <span id="stat-chars"   class="stat"></span>
  <span id="stat-stripped" class="stat"></span>
  <span id="stat-tokens"  class="stat accent"></span>
</div>

<button id="download-btn" class="btn-download hidden">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="7 10 12 15 17 10"/>
    <line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
  Download .txt
</button>

<script src="popup.js"></script>
</body>
</html>
